<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DORÉ | Assados</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');
        
        :root { --mouse-x: 50%; --mouse-y: 50%; }
        
        body { 
          background-color: #030303; 
          font-family: 'Inter', sans-serif; 
          margin: 0; 
          overflow-x: hidden;
          -webkit-font-smoothing: antialiased;
          overscroll-behavior-y: none; 
          -webkit-tap-highlight-color: transparent;
        }

        .ambient-glow {
          position: fixed;
          top: 0; left: 0; width: 100vw; height: 100vh;
          z-index: -1;
          overflow: hidden;
          background: #030303;
        }
        
        .glow-orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(120px);
          opacity: 0.12;
          animation: float-glow 20s infinite ease-in-out alternate;
        }
        
        .glow-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #D4AF37; }
        .glow-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #FF8C00; animation-delay: -5s; }

        @keyframes float-glow {
          0% { transform: translate(0, 0) scale(1); }
          100% { transform: translate(10%, 10%) scale(1.1); }
        }

        .glass-panel {
          background: rgba(15, 15, 15, 0.4);
          backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          border: 1px solid rgba(255, 255, 255, 0.05);
          transition: all 0.3s ease;
          cursor: pointer;
          user-select: none;
        }
        
        .glass-panel:hover, .glass-panel.selected {
          border-color: rgba(212, 175, 55, 0.6);
          background: rgba(30, 30, 30, 0.7);
          transform: translateY(-2px);
          box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(212, 175, 55, 0.1) inset;
        }

        .app-card {
          background-color: #111;
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 1rem;
          transition: all 0.2s ease;
          user-select: none;
          overflow: hidden;
        }
        
        .app-card:active, .app-card.selected {
          border-color: rgba(212, 175, 55, 0.8);
          background-color: #1a1a1a;
          transform: scale(0.98);
          box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .text-shadow-glow { text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-12px); }
          100% { transform: translateY(0px); }
        }

        .reveal { 
          opacity: 0; 
          transform: translateY(20px); 
          transition: opacity 0.6s ease-out, transform 0.6s ease-out; 
          will-change: opacity, transform;
        }
        .reveal.visible { 
          opacity: 1; 
          transform: translateY(0); 
        }

        @keyframes pulse-soft {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        select, input { 
          appearance: none; -webkit-appearance: none; 
          outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.2); }

        .signature-font {
          font-family: 'Playfair Display', serif;
          font-style: italic;
        }
    </style>
</head>
<body>
    <div class="ambient-glow">
        <div class="glow-orb glow-1"></div>
        <div class="glow-orb glow-2"></div>
    </div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const LOGO_URL = "https://alisachapeco.com.br/assets/images/image19.png?v=5f40d70b";
        const SENSORIAL_IMG = "https://alisachapeco.com.br/assets/images/image21.png?v=e9c990c3";
        const PATTERN_URL = "https://alisachapeco.com.br/assets/images/image18.png?v=337fcc30";

        const BANNER_IMAGES = [
          "https://alisachapeco.com.br/assets/images/image23.jpg?v=d4bc2a9d",
          "https://alisachapeco.com.br/assets/images/image24.jpg?v=d9123dc9"
        ];

        // --- SISTEMA DE RESERVAS & ESCASSEZ (Lote de 15 Dias) ---
        const RESERVATION_SLOTS = [
          { id: 'd0', week: 'Neste Fim de Semana', date: 'Sexta', stock: 0 },
          { id: 'd1', week: 'Neste Fim de Semana', date: 'Sábado', stock: 0 },
          { id: 'd2', week: 'Neste Fim de Semana', date: 'Domingo', stock: 0 },
          { id: 'd3', week: 'Próxima Semana', date: 'Sexta', stock: 0 },
          { id: 'd4', week: 'Próxima Semana', date: 'Sábado', stock: 0 },
          { id: 'd5', week: 'Próxima Semana', date: 'Domingo', stock: 0 },
          { id: 'd6', week: 'Lote Aberto (Em 15 Dias)', date: 'Sexta, 08/05', stock: 12 },
          { id: 'd7', week: 'Lote Aberto (Em 15 Dias)', date: 'Sábado, 09/05', stock: 9 },
          { id: 'd8', week: 'Lote Aberto (Em 15 Dias)', date: 'Domingo, 10/05', stock: 5 }
        ];

        const HORARIOS_ENTREGA = ['11:00 - 11:30', '11:30 - 12:00', '12:00 - 12:30', '12:30 - 13:00'];
        const BAIRROS_FRETE = { 'Centro': 12, 'Efapi': 20, 'Santa Maria': 15, 'Passo dos Fortes': 15, 'Bela Vista': 12, 'Outros': 18 };

        // --- BANCO DE DADOS SENSORIAL ---
        const BUILDER_DATA = {
          cortes: [
            { id: 'c1', name: 'DORÉ Crosta Panko', type: 'classico', desc: 'Retirado do calor exato e selado com uma armadura de Panko artesanal temperada e tostada na manteiga.', price: 115, img: 'https://alisachapeco.com.br/assets/images/image20.jpg?v=e9c990c3' },
            { id: 'c2', name: 'DORÉ Recheado & Selado', type: 'recheado', desc: 'Desossado parcialmente para abrigar nossos recheios, finalizado com a crosta cítrica e crocante de Panko.', price: 145, img: 'https://alisachapeco.com.br/assets/images/image18.jpg?v=e9c990c3' }
          ],
          marinadas: [
            { id: 'm1', name: 'Vinho Branco, Limão Siciliano & Alecrim', desc: 'Notas herbáceas de alecrim fresco e acidez elegante. A infusão que desperta o paladar.', img: 'https://images.unsplash.com/photo-1590412200988-a436970781fa?q=80&w=400&auto=format&fit=crop' },
            { id: 'm2', name: 'Cerveja Stout & Mostarda Rústica', desc: 'Aroma maltado, sabor profundo e um toque defumado. Caramelização intensa na pele.', img: 'https://images.unsplash.com/photo-1605333398740-1bc6b4b42211?q=80&w=400&auto=format&fit=crop' },
            { id: 'm3', name: 'Laranja, Cravo & Tomilho Fresco', desc: 'O perfume cítrico da laranja entrelaçado ao tomilho. Uma homenagem sensorial ao assado de família.', img: 'https://images.unsplash.com/photo-1611078713374-219e2e604f32?q=80&w=400&auto=format&fit=crop' }
          ],
          recheios: [
            { id: 'r1', name: 'Farofa de Miúdos Nobres', desc: 'Miúdos selecionados, bacon defumado e o perfume marcante da sálvia fresca na manteiga.', img: 'https://images.unsplash.com/photo-1551185458-75f1ea38de1f?q=80&w=400&auto=format&fit=crop' },
            { id: 'r2', name: 'Maçã Verde & Castanhas Torradas', desc: 'O estalo das castanhas e a suculência adocicada da maçã equilibrando os sucos da carne.', img: 'https://images.unsplash.com/photo-1605291523315-d72b2ab68d89?q=80&w=400&auto=format&fit=crop' },
            { id: 'r3', name: 'Queijo Coalho Dourado & Alho Poró', desc: 'Textura elástica do queijo tostado que se funde com a suavidade aromática do alho poró.', img: 'https://images.unsplash.com/photo-1634458397368-8092ec0f80b9?q=80&w=400&auto=format&fit=crop' }
          ]
        };

        const EXTRAS = {
          farofas: [
            { id: 'e1', name: 'Farofa de Pistache', desc: 'Pistaches tostados com manteiga noisette e um toque de flor de sal.', price: 42, img: 'https://images.unsplash.com/photo-1540420828642-fca2c5c18abe?q=80&w=200&auto=format&fit=crop' },
            { id: 'e2', name: 'Farofa Panko Rústica', desc: 'Crocância estaladiça selada na autêntica manteiga de garrafa.', price: 35, img: 'https://images.unsplash.com/photo-1563805042-7684c8a9e9bc?q=80&w=200&auto=format&fit=crop' }
          ],
          molhos: [
            { id: 'e3', name: 'Aioli de Alho Negro', desc: 'Sabor intensamente umami, notas trufadas e final levemente adocicado.', price: 18, img: 'https://images.unsplash.com/photo-1626200419188-3ca649a20726?q=80&w=200&auto=format&fit=crop' },
            { id: 'e4', name: 'Chimichurri DORÉ', desc: 'Ervas frescas picadas à mão, vinagre de maçã e azeite extra virgem.', price: 15, img: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=200&auto=format&fit=crop' },
            { id: 'e5', name: 'Mostarda & Mel Silvestre', desc: 'A pungência da mostarda dijon quebrada pelo mel cru. Equilíbrio perfeito.', price: 16, img: 'https://images.unsplash.com/photo-1588673756209-667500dcc684?q=80&w=200&auto=format&fit=crop' }
          ]
        };

        const triggerVibration = (pattern) => {
          if (typeof window !== "undefined" && window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(pattern);
          }
        };

        function App() {
          const [stage, setStage] = useState('gate');
          const [cart, setCart] = useState([]);
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [toast, setToast] = useState(null);
          
          const [bairro, setBairro] = useState('Centro');
          const [horario, setHorario] = useState(HORARIOS_ENTREGA[0]);
          const [selectedDate, setSelectedDate] = useState(RESERVATION_SLOTS.find(s => s.stock > 0));
          const [instrucoes, setInstrucoes] = useState('');

          const [builder, setBuilder] = useState({ corte: null, marinada: null, recheio: null });
          const [currentSlide, setCurrentSlide] = useState(0);

          const requestRef = useRef();
          const isIdle = useRef(true);

          const animateSpotlight = (time) => {
            if (isIdle.current) {
              const speed = 0.0012;
              const x = (window.innerWidth / 2) + (window.innerWidth * 0.35) * Math.sin(time * speed);
              const y = (window.innerHeight / 2) + (window.innerHeight * 0.25) * Math.sin(time * speed * 2);
              document.documentElement.style.setProperty('--mouse-x', `${x}px`);
              document.documentElement.style.setProperty('--mouse-y', `${y}px`);
              requestRef.current = requestAnimationFrame(animateSpotlight);
            }
          };

          useEffect(() => {
            requestRef.current = requestAnimationFrame(animateSpotlight);
            const handleMove = (e) => {
              if (isIdle.current) {
                isIdle.current = false;
                cancelAnimationFrame(requestRef.current);
              }
              const x = e.clientX || (e.touches && e.touches[0].clientX) || 0;
              const y = e.clientY || (e.touches && e.touches[0].clientY) || 0;
              document.documentElement.style.setProperty('--mouse-x', `${x}px`);
              document.documentElement.style.setProperty('--mouse-y', `${y}px`);
            };
            window.addEventListener('mousemove', handleMove, { passive: true });
            window.addEventListener('touchmove', handleMove, { passive: true });
            return () => {
              cancelAnimationFrame(requestRef.current);
              window.removeEventListener('mousemove', handleMove);
              window.removeEventListener('touchmove', handleMove);
            };
          }, []);

          useEffect(() => {
            if (stage === 'shop') {
              const interval = setInterval(() => {
                setCurrentSlide(prev => (prev === 0 ? 1 : 0));
              }, 5000); 
              return () => clearInterval(interval);
            }
          }, [stage]);

          useEffect(() => {
            if (stage === 'shop') {
              const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                  if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                  }
                });
              }, { threshold: 0.1 });

              const elements = document.querySelectorAll('.reveal');
              elements.forEach(el => observer.observe(el));
              return () => elements.forEach(el => observer.unobserve(el));
            }
          }, [stage]);

          const showToast = (msg) => {
            setToast(msg);
            setTimeout(() => setToast(null), 3000);
          };

          const handleSelectCorte = (item) => {
            triggerVibration(15);
            setBuilder(prev => ({ ...prev, corte: item, recheio: item.type === 'classico' ? null : prev.recheio }));
            setTimeout(() => document.getElementById('passo-marinada').scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
          };

          const handleSelectMarinada = (item) => {
            triggerVibration(15);
            setBuilder(prev => ({ ...prev, marinada: item }));
            setTimeout(() => {
              if (builder.corte?.type === 'classico') {
                document.getElementById('passo-complementos').scrollIntoView({ behavior: 'smooth', block: 'start' });
              } else {
                document.getElementById('passo-recheio').scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            }, 150);
          };

          const handleSelectRecheio = (item) => {
            triggerVibration(15);
            setBuilder(prev => ({ ...prev, recheio: item }));
            setTimeout(() => document.getElementById('passo-complementos').scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
          };

          const addCustomChickenToCart = () => {
            if (!builder.corte) { triggerVibration([40, 40]); return showToast("Selecione a base do assado."); }
            if (!builder.marinada) { triggerVibration([40, 40]); return showToast("Escolha a infusão botânica."); }
            if (builder.corte.type === 'recheado' && !builder.recheio) { triggerVibration([40, 40]); return showToast("Defina o recheio artesanal."); }

            triggerVibration(30);
            let desc = `Infusão: ${builder.marinada.name}`;
            if (builder.corte.type === 'recheado') desc += ` | Recheio: ${builder.recheio.name}`;

            const customItem = {
              id: `${builder.corte.id}-${builder.marinada.id}-${builder.recheio?.id || 'none'}-${Date.now()}`,
              name: builder.corte.name,
              desc: desc,
              price: builder.corte.price,
              img: builder.corte.img
            };

            setCart(prev => [...prev, { ...customItem, qty: 1 }]);
            setBuilder({ corte: null, marinada: null, recheio: null }); 
            showToast(`${customItem.name} reservado.`);
            setTimeout(() => setIsCartOpen(true), 600); 
          };

          const addExtraToCart = (item) => {
            triggerVibration(20);
            setCart(prev => {
              const exists = prev.find(i => i.id === item.id);
              if (exists) return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
              return [...prev, { ...item, qty: 1 }];
            });
            showToast(`${item.name} selecionado`);
          };

          const removeFromCart = (id) => {
            triggerVibration([20, 20]);
            setCart(prev => prev.filter(item => item.id !== id));
          };

          const subtotal = useMemo(() => cart.reduce((acc, i) => acc + (i.price * i.qty), 0), [cart]);
          const freightValue = cart.length > 0 ? BAIRROS_FRETE[bairro] : 0;
          const total = subtotal + freightValue;

          const isBuilderActive = builder.corte !== null;
          const isBuilderComplete = builder.corte && builder.marinada && (builder.corte.type === 'classico' || builder.recheio);
          
          const handleStickyBarClick = () => {
            if (isBuilderComplete) {
              addCustomChickenToCart();
            } else if (isBuilderActive && !builder.marinada) {
              document.getElementById('passo-marinada').scrollIntoView({ behavior: 'smooth', block: 'start' });
              triggerVibration(10);
            } else if (isBuilderActive && builder.corte.type === 'recheado' && !builder.recheio) {
              document.getElementById('passo-recheio').scrollIntoView({ behavior: 'smooth', block: 'start' });
              triggerVibration(10);
            } else if (cart.length > 0) {
              setIsCartOpen(true);
              triggerVibration(10);
            } else {
              document.getElementById('passo-corte').scrollIntoView({ behavior: 'smooth', block: 'start' });
              triggerVibration(10);
            }
          };

          // --- GATE ---
          if (stage === 'gate') {
            return (
              <div className="fixed inset-0 flex flex-col items-center justify-center z-[9999] overflow-hidden bg-[#030303]">
                <div style={{ position: 'absolute', inset: 0, zIndex: 5, pointerEvents: 'none', overflow: 'hidden', background: 'radial-gradient(circle 400px at var(--mouse-x, 50vw) var(--mouse-y, 50vh), rgba(212, 175, 55, 0.15) 0%, transparent 80%)', WebkitMaskImage: 'radial-gradient(circle 400px at var(--mouse-x, 50vw) var(--mouse-y, 50vh), black 10%, rgba(0,0,0,0.2) 60%, transparent 100%)' }}>
                  <div style={{ position: 'absolute', top: '-50%', left: '-50%', width: '200%', height: '200%', backgroundSize: 'clamp(80px, 12vw, 150px)', backgroundRepeat: 'repeat', transform: 'rotate(-15deg)', opacity: 0.25, filter: 'grayscale(1) brightness(1.3) contrast(1.2)', mixBlendMode: 'screen', backgroundImage: `url(${LOGO_URL})` }}></div>
                </div>
                <div className="relative z-20 text-center flex flex-col items-center px-6 pointer-events-none">
                  <div className="mb-16 pointer-events-auto" style={{ animation: 'fadeInUpFixed 1.5s cubic-bezier(0.16, 1, 0.3, 1) both' }}>
                    <div className="absolute inset-0 bg-[#D4AF37] blur-[140px] opacity-10"></div>
                    <img src={LOGO_URL} alt="DORÉ" className="h-40 md:h-64 relative z-10 drop-shadow-[0_0_20px_rgba(212,175,55,0.4)]" />
                  </div>
                  <div className="flex flex-col items-center gap-6 pointer-events-auto" style={{ animation: 'fadeInUpFixed 1.5s cubic-bezier(0.16, 1, 0.3, 1) both', animationDelay: '0.5s' }}>
                    <div className="w-[1px] h-20 bg-gradient-to-b from-transparent via-[#D4AF37] to-transparent opacity-50"></div>
                    <button onClick={() => { triggerVibration([40, 30, 40]); setStage('shop'); }} className="group relative px-12 py-5 border border-[#D4AF37]/30 bg-black/40 backdrop-blur-md text-[#D4AF37] text-[10px] tracking-[0.6em] uppercase font-light overflow-hidden transition-all hover:bg-[#D4AF37] hover:text-black rounded-full">
                      <span className="relative z-10 font-bold">Acessar a Boutique</span>
                      <div className="absolute inset-0 bg-[#D4AF37] translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                    </button>
                  </div>
                </div>
                <style>{`@keyframes fadeInUpFixed { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }`}</style>
              </div>
            );
          }

          return (
            <div className="min-h-screen text-[#F4F1EA] font-sans selection:bg-[#D4AF37] selection:text-black pb-24 md:pb-0">
              
              <div className={`fixed top-24 md:top-28 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 transform ${toast ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0 pointer-events-none'}`}>
                <div className="bg-[#111111] border border-[#D4AF37]/30 text-[#F4F1EA] px-6 py-3 rounded-full text-[10px] tracking-widest uppercase flex items-center gap-3 shadow-[0_15px_30px_rgba(0,0,0,0.8)]">
                  <div className="w-1.5 h-1.5 bg-[#D4AF37] rounded-full animate-pulse shadow-[0_0_5px_#D4AF37]"></div>
                  <span>{toast}</span>
                </div>
              </div>

              <div className={`fixed bottom-0 left-0 w-full z-40 transition-transform duration-500 ease-in-out md:hidden ${stage === 'shop' && !isCartOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                <div className="bg-[#050505]/95 backdrop-blur-2xl border-t border-white/10 p-4 pb-6 shadow-[0_-10px_40px_rgba(0,0,0,0.9)]">
                  <button 
                    onClick={handleStickyBarClick}
                    className={`w-full py-4 rounded-xl font-bold uppercase tracking-[0.2em] text-[10px] transition-all duration-300 flex justify-center items-center gap-3 ${
                      isBuilderComplete 
                        ? 'bg-[#D4AF37] text-black shadow-[0_0_20px_rgba(212,175,55,0.3)]' 
                        : cart.length > 0 && !isBuilderActive
                          ? 'bg-white text-black'
                          : 'bg-white/10 text-[#D4AF37] border border-[#D4AF37]/30'
                    }`}
                  >
                    {!isBuilderActive && cart.length === 0 && 'Iniciar Seleção'}
                    {isBuilderActive && !builder.marinada && 'Próximo: Escolher Infusão'}
                    {isBuilderActive && builder.marinada && builder.corte?.type === 'recheado' && !builder.recheio && 'Próximo: Escolher Recheio'}
                    {isBuilderComplete && `Finalizar Seleção (R$ ${builder.corte.price})`}
                    {!isBuilderActive && cart.length > 0 && `Ver Reserva (R$ ${total.toFixed(2)})`}
                  </button>
                </div>
              </div>

              <nav className="fixed top-0 w-full z-40 bg-[#050505]/90 backdrop-blur-xl border-b border-white/5 shadow-2xl">
                <div className="max-w-6xl mx-auto px-6 h-20 md:h-24 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <img src={LOGO_URL} alt="DORÉ" className="h-8 opacity-90" />
                  </div>
                  <button onClick={() => { triggerVibration(10); setIsCartOpen(true); }} className="flex items-center gap-4 group">
                    <div className="text-right hidden sm:block">
                      <p className="text-[8px] tracking-[0.2em] uppercase opacity-40 group-hover:opacity-100 transition-opacity">Sua Reserva</p>
                      <p className="text-xs font-mono text-[#D4AF37]">R$ {total.toFixed(2)}</p>
                    </div>
                    <div className="w-10 h-10 rounded-full border border-white/10 bg-[#111111] flex items-center justify-center group-hover:border-[#D4AF37] transition-all relative">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/></svg>

                        <div className="flex justify-between text-[9px] text-white/40 tracking-[0.1em] uppercase items-center">
                          <span>Frete</span>
                          <span className="font-mono text-white/70">R$ {freightValue.toFixed(2)}</span>
                        </div>
                      </div>
                      
                      <div className="pt-3 flex justify-between items-baseline border-t border-white/5">
                        <span className="text-xl font-serif text-white">Total</span>
                        <span className="text-lg font-mono text-[#D4AF37]">R$ {total.toFixed(2)}</span>
                      </div>
                      
                      <button onClick={() => {
                          triggerVibration([30, 20, 30]);
                          const itemsMsg = cart.map(i => `• ${i.name} (${i.qty}x)%0A  _${i.desc}_`).join('%0A%0A');
                          const finalMsg = `Olá, Chef Thiago! Gostaria de reservar meu lote.%0A%0A*📦 Pedido:*%0A${itemsMsg}%0A%0A*📅 Data Reservada:* ${selectedDate.date}%0A*⏱ Horário:* ${horario}%0A*📍 Bairro:* ${bairro}%0A*Obs:* ${instrucoes || 'Nenhuma'}%0A%0A*💳 Total:* R$ ${total.toFixed(2)}%0A%0A_Aguardando chave Pix e confirmação da reserva._`;
                          window.open(`https://wa.me/5549999999999?text=${finalMsg}`);
                        }}
                        className="w-full bg-[#D4AF37] text-black py-4 rounded-xl font-bold uppercase tracking-[0.2em] text-[9px] hover:bg-white transition-colors mt-2"
                      >
                        Garantir Reserva (WhatsApp)
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
